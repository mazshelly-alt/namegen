permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials with GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::605199373262:role/GitHubActionsEKSDeployRole
          aws-region: us-west-2

      - name: Confirm AWS identity
        run: aws sts get-caller-identity

      - name: Configure kubectl
        run: aws eks update-kubeconfig --region us-west-2 --name auto-mode-cluster

      - name: Deploy to EKS
        run: kubectl apply -f k8s/
