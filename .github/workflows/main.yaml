name: eksworkflow
on: 
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  cicd_job:
    name: build and deploy to eks
    runs-on: ubuntu-latest

    steps:
    - name: checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials with GitHub OIDC
      uses: aws-actions/configure-aws-credentials@v6.1.0
      with:
        aws-region: us-west-2
        role-to-assume: arn:aws:iam::605199373262:role/githubactions_role
        role-session-name: githubactions_role-${{ github.run_id }}


    - name: Test AWS connection
      run: aws sts get-caller-identity

    - name: login to ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

      env:
       IMAGE_TAG: ${{ github.sha }}
      
    - name: Build Docker Image
      run: |
          docker build -t myapps/namegen:$IMAGE_TAG .

    - name: tag Docker Image
      run: |
        docker tag myapps/namegen:$IMAGE_TAG \605199373262.dkr.ecr.us-west-2.amazonaws.com/myapps/namegen:$IMAGE_TAG

    - name: Push Docker Image
      run: |
        docker push \605199373262.dkr.ecr.us-west-2.amazonaws.com/myapps/namegen:$IMAGE_TAG
          
    - name: Update Kubernetes
      run: |
          kubectl set image deployment/namegen \namegen=605199373262.dkr.ecr.us-west-2.amazonaws.com/myapps/namegen:$IMAGE_TAG

    - name: Restart Deployment
      run: |
          kubectl rollout restart deployment/namegen
